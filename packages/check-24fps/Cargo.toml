[package]
name = "check-24fps"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "check24fps"
path = "src/main.rs"

[dependencies]
aftereffects-aep-parser-rs = { path = "../aftereffects-aep-parser-rs" }
clap = { version = "4.5", features = ["derive"] }
glob = "0.3"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
walkdir = "2.5"

[dev-dependencies]
assert_cmd = "2.0"
predicates = "3.1"
tempfile = "3.15"
